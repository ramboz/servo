# Servo's Python lint floor — spec 009-02. Config-only: servo is a Claude Code
# plugin, not a pip package, so this just configures the lint gate that CI and
# contributors run. The ruleset mirrors jig (the sibling plugin) so the two
# projects' lint floors read the same way.
line-length = 100
# ADR-0020: Python 3.9 is servo's supported floor. `target-version = py39` is the
# static backstop — it flags 3.10+ syntax (bare PEP 604 unions outside
# `from __future__ import annotations`, `zip(strict=)`, `match`, …) so a
# regression is caught even before the 3.9 CI leg runs. The 3.9 matrix job is
# the load-bearing guard; this is the cheap early signal.
target-version = "py39"

[lint]
select = ["F", "E", "W", "I", "B"]
# E402 (module-level import not at top of file) is ignored for the same reason
# jig ignores it: the deferred `sys.path.insert(...)` + sibling-module import
# pattern (e.g. scripts/build_release_zip.py's `import verify_install` inside
# smoke_test). No module-level E402 case exists in the tree today, so this is
# forward-looking + jig parity, not a current suppression.
ignore = ["E402"]
