name: CI

"on":
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Servo's helpers run on adopters' Python. Bracket the supported range:
        # the macOS-compatible 3.9 floor and the latest supported 3.x.
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test runner
        run: python3 -m pip install --upgrade pip pytest

      - name: Run test suite
        run: python3 scripts/run_tests.py

      - name: Validate manifests
        run: python3 scripts/validate_manifests.py

      - name: Code-health floor
        run: pipx run --spec ruff==0.15.17 ruff check .

      - name: Verify install surfaces
        run: bash scripts/verify_install_surfaces.sh

      - name: Host-package drift guard
        run: python3 scripts/build_host_packages.py --check
