name: Release

# Spec 010 (release-automation), implementing ADR-0007. Two halves, mirroring
# jig:
#   - release-please: reads main's conventional-commit history → version bump
#     (plugin.json via extra-files) + CHANGELOG.md + tag vX.Y.Z + GitHub release,
#     all via a release PR.
#   - package: on a created release, build + smoke-test servo's release zip and
#     upload it as a release asset.
# Both rely on main's commit subjects being release-please-readable, which the
# pr-title.yml gate + squash-merge guarantee. `on:` is quoted (servo house
# style, see ci.yml).

"on":
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  package:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build + smoke-test release zip
        # servo's builder builds AND smoke-tests in a single default invocation
        # (--no-smoke would skip the verification; spec 007). Passing --version
        # makes a version/tag mismatch fail loudly — the builder validates the
        # requested version against .claude-plugin/plugin.json and exits 2 on
        # mismatch. The default output is dist/servo-v<version>.zip, so a
        # failing smoke test fails this step before the upload step runs.
        run: |
          python3 scripts/build_release_zip.py \
            --version "${{ needs.release-please.outputs.version }}"

      - name: Upload zip to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload \
            "${{ needs.release-please.outputs.tag_name }}" \
            "dist/servo-v${{ needs.release-please.outputs.version }}.zip"
